version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tutor-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_tutor
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace-with-a-strong-random-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NUXT_BASE_URL: ${NUXT_BASE_URL:-http://localhost:3000}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-}
      CLASS_MATERIALS_R2_ACCOUNT_ID: ${CLASS_MATERIALS_R2_ACCOUNT_ID:-}
      CLASS_MATERIALS_R2_ACCESS_KEY_ID: ${CLASS_MATERIALS_R2_ACCESS_KEY_ID:-}
      CLASS_MATERIALS_R2_SECRET_ACCESS_KEY: ${CLASS_MATERIALS_R2_SECRET_ACCESS_KEY:-}
      CLASS_MATERIALS_R2_BUCKET_NAME: ${CLASS_MATERIALS_R2_BUCKET_NAME:-}
      CLASS_MATERIALS_R2_PUBLIC_DOMAIN: ${CLASS_MATERIALS_R2_PUBLIC_DOMAIN:-}
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    container_name: ai-tutor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_tutor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_tutor"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./packages/ai-service
      dockerfile: Dockerfile
    container_name: ai-tutor-ai-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://web:3000/mcp}
      # If ai-service needs DB in future, use this:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_tutor
    ports:
      - "8000:8000"

volumes:
  pgdata:
